<body class="bg-background text-on-background font-body-md min-h-screen flex">
    <script src="/js/auth.js"></script>
    <!-- SideNavBar (shared component) -->
    <div id="sidebar-mount"></div>
    <!-- Main Content Wrapper -->
    <div class="flex-1 flex flex-col w-full min-w-0 relative">
        <!-- TopAppBar -->
        <header
            class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop h-20 sticky top-0 z-50 bg-surface border-b border-outline-variant sidebar-offset sidebar-offset-header">
            <div class="flex items-center gap-4">
                <button id="mobile-menu-btn" class="md:hidden p-2">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <div class="relative hidden sm:block">
                    <span
                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
                    <input
                        class="bg-surface-container-low border-none rounded-full py-2 pl-10 pr-4 w-56 md:w-64 lg:w-80 focus:ring-2 focus:ring-primary text-sm h-10"
                        id="global-search-input" placeholder="Search courses, paths..." type="text">
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-3">
                    <div id="header-avatar-mount"></div>
                </div>
            </div>
        </header>
        <!-- Page Content -->
        <main class="flex-1 w-full max-w-[1200px] mx-auto p-margin-mobile md:p-margin-desktop sidebar-offset">
            <!-- Header -->
            <div class="mb-8 fade-up">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h2 class="font-headline-lg text-headline-lg text-on-surface">Catalog</h2>
                        <p class="font-body-lg text-body-lg text-on-surface-variant mt-2">Officially approved learning
                            paths for your department.</p>
                    </div>
                </div>
            </div>
            <!-- Path Grid -->
            <div id="paths-grid" class="grid grid-cols-1 md:grid-cols-2 gap-card-gap fade-up-2">
                <!-- Loading placeholder -->
                <div class="col-span-full text-center py-12 text-on-surface-variant">
                    <span class="material-symbols-outlined text-4xl mb-2 block animate-spin">sync</span>
                    Loading catalog...
                </div>
            </div>
        </main>
    </div>

    <script>
        // ── Load approved (official) Learning Paths from API ──
        const ICON_MAP = {
            'ai': { icon: 'architecture', color: 'text-primary', bg: 'bg-primary/10', tag: 'AI & ML', tagColor: 'text-primary' },
            'ml': { icon: 'psychology', color: 'text-primary', bg: 'bg-primary/10', tag: 'AI & ML', tagColor: 'text-primary' },
            'cloud': { icon: 'cloud_sync', color: 'text-secondary', bg: 'bg-secondary/10', tag: 'Cloud', tagColor: 'text-secondary' },
            'data': { icon: 'database', color: 'text-on-surface-variant', bg: 'bg-surface-variant/30 dark:bg-white/5', tag: 'Data', tagColor: 'text-on-surface-variant' },
            'vertex': { icon: 'model_training', color: 'text-primary', bg: 'bg-primary/10', tag: 'Vertex AI', tagColor: 'text-primary' },
            'gemini': { icon: 'auto_awesome', color: 'text-secondary', bg: 'bg-secondary/10', tag: 'Gemini', tagColor: 'text-secondary' },
            'default': { icon: 'school', color: 'text-primary', bg: 'bg-primary/10', tag: 'Course', tagColor: 'text-primary' },
        };

        function getIconConfig(title) {
            const lower = (title || '').toLowerCase();
            for (const [key, config] of Object.entries(ICON_MAP)) {
                if (key !== 'default' && lower.includes(key)) return config;
            }
            return ICON_MAP.default;
        }

        (async function loadPaths() {
            try {
                const session = window.WisdomAuth.requireAuth();
                if (!session) return;
                const USER_ID = session.user_id;
                const [res, enrolledRes] = await Promise.all([
                    fetch('/api/kb/catalog/learning-paths?official_only=true'),
                    fetch(`/api/learning-path/enrolled?user_id=${USER_ID}`).catch(() => null),
                ]);
                const data = await res.json();
                const paths = data.learning_paths || [];

                // Real per-path status: any path you're enrolled in shows its own
                // progress, not just whichever one you opened most recently.
                const enrolledData = enrolledRes && enrolledRes.ok ? await enrolledRes.json().catch(() => ({})) : {};
                const enrolledByPathId = new Map((enrolledData.enrolled_paths || []).map(p => [p.path_id, p]));

                const grid = document.getElementById('paths-grid');

                if (paths.length === 0) {
                    grid.innerHTML = `
                    <div class="col-span-full text-center py-12 text-on-surface-variant">
                        <span class="material-symbols-outlined text-4xl mb-2 block">folder_open</span>
                        No approved learning paths yet.
                    </div>`;
                    return;
                }

                grid.innerHTML = paths.map((p, idx) => {
                    const iconConfig = getIconConfig(p.title);
                    const badge = `<div class="absolute top-3 left-3 bg-surface-container-lowest/90 px-2 py-1 rounded text-xs font-label-md ${iconConfig.tagColor} font-bold shadow-sm">${iconConfig.tag}</div>`;

                    // Real status from the enrolled-paths list — any enrolled path
                    // shows its own progress, not just the most recently opened one.
                    const enrollment = enrolledByPathId.get(p.path_id);
                    const progress = enrollment ? enrollment.progress_pct : 0;
                    const isDone = progress >= 100;
                    const isStarted = !!enrollment && progress > 0;
                    const statusLabel = isStarted ? 'Progress' : 'Status';
                    const progressLabel = isDone ? 'Completed' : (isStarted ? `${progress}%` : 'Not Started');
                    const progressColor = isDone ? 'text-tertiary' : 'text-primary';
                    const barColor = isDone ? 'bg-tertiary' : 'bg-secondary-container';

                    const hours = p.total_estimated_hours || 0;
                    const courseCount = p.total_courses || 0;

                    return `
                <a href="/learning-path" data-path-id="${p.path_id}" data-path-type="official" class="path-card bg-surface-container-lowest rounded-xl border border-outline-variant overflow-hidden flex flex-col group hover:shadow-lg hover:border-primary/30 hover:-translate-y-0.5 transition-all duration-200 cursor-pointer no-underline">
                    <div class="h-28 ${iconConfig.bg} relative flex items-center justify-center border-b border-outline-variant overflow-hidden">
                        <div class="absolute inset-0 bg-[radial-gradient(120%_100%_at_50%_0%,rgba(255,255,255,0.35),transparent_70%)] dark:bg-[radial-gradient(120%_100%_at_50%_0%,rgba(255,255,255,0.06),transparent_70%)] pointer-events-none"></div>
                        <span class="material-symbols-outlined text-5xl ${iconConfig.color}">${iconConfig.icon}</span>
                        ${badge}
                    </div>
                    <div class="p-5 flex-1 flex flex-col">
                        <h3 class="font-headline-md text-headline-md text-on-surface mb-2">${p.title}</h3>
                        <p class="font-body-md text-body-md text-on-surface-variant line-clamp-2 mb-4 flex-1">
                            Official department learning path
                            ${p.source_document ? ` • Source: ${p.source_document}` : ''}
                        </p>
                        <div class="mt-auto">
                            <div class="flex justify-between items-end mb-1.5">
                                <div class="flex flex-col">
                                    <span class="text-xs font-label-md text-on-surface-variant uppercase tracking-wider">${statusLabel}</span>
                                    <span class="js-status-label font-stats-number text-stats-number ${progressColor}">${progressLabel}</span>
                                </div>
                                <div class="text-right flex flex-col items-end">
                                    <span class="text-xs text-on-surface-variant flex items-center gap-1">
                                        <span class="material-symbols-outlined text-[14px]">view_module</span> ${courseCount} Course${courseCount !== 1 ? 's' : ''}
                                    </span>
                                    <span class="text-xs text-on-surface-variant flex items-center gap-1 mt-1">
                                        <span class="material-symbols-outlined text-[14px]">schedule</span> ${hours} hrs
                                    </span>
                                </div>
                            </div>
                            <div class="w-full bg-surface-container h-1.5 rounded-full overflow-hidden">
                                <div class="${barColor} h-full rounded-full transition-all duration-500" style="width: ${progress}%;"></div>
                            </div>
                        </div>
                    </div>
                </a>`;
                }).join('');

                // Enroll in the clicked path (if not already), then open it.
                // Enrolling never disturbs any other path you're already enrolled in.
                grid.querySelectorAll('a.path-card[data-path-id]').forEach((card) => {
                    card.addEventListener('click', async (e) => {
                        e.preventDefault();
                        if (card.dataset.busy === '1') return;
                        card.dataset.busy = '1';
                        const pathId = card.dataset.pathId;
                        const statusEl = card.querySelector('.js-status-label');
                        const original = statusEl ? statusEl.textContent : '';
                        if (statusEl) statusEl.textContent = 'Opening…';
                        card.classList.add('opacity-60', 'pointer-events-none');
                        try {
                            const resp = await fetch(
                                `/api/learning-path/${encodeURIComponent(pathId)}/enroll?path_type=official&user_id=${encodeURIComponent(USER_ID)}`,
                                { method: 'POST' }
                            );
                            if (!resp.ok) throw new Error(`enroll failed (${resp.status})`);
                            window.location.href = `/learning-path?path=${encodeURIComponent(pathId)}`;
                        } catch (err) {
                            card.classList.remove('opacity-60', 'pointer-events-none');
                            card.dataset.busy = '';
                            if (statusEl) {
                                statusEl.textContent = 'Error — try again';
                                setTimeout(() => { statusEl.textContent = original; }, 2500);
                            }
                        }
                    });
                });
            } catch (e) {
                document.getElementById('paths-grid').innerHTML = `
                <div class="col-span-full text-center py-12 text-error">
                    <span class="material-symbols-outlined text-4xl mb-2 block">error</span>
                    Failed to load catalog.
                </div>`;
            }
        })();
    </script>

    <script src="/js/api-client.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/global-search.js"></script>
</body>

</html>
