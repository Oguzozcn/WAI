<script>
function renderLearningPathEmptyState() {
    const badge = document.getElementById('lp-active-badge');
    if (badge) badge.classList.add('hidden');
    const breadcrumb = document.getElementById('lp-breadcrumb-path');
    if (breadcrumb) breadcrumb.textContent = 'No active path';
    const title = document.getElementById('lp-title');
    if (title) title.textContent = "You haven't started a learning path yet";
    const desc = document.getElementById('lp-desc');
    if (desc) desc.textContent = '';

    // No path, no spine, no stats — just the empty message and a way out.
    const progressLine = document.getElementById('lp-progress-line');
    if (progressLine) progressLine.classList.add('hidden');
    const statsSidebar = document.getElementById('lp-stats-sidebar');
    if (statsSidebar) statsSidebar.classList.add('hidden');

    const container = document.getElementById('learning-path-container');
    if (container) {
        container.innerHTML = `
        <div class="flex flex-col items-center text-center py-16 text-on-surface-variant">
            <span class="material-symbols-outlined text-5xl mb-4">route</span>
            <p class="font-headline-md text-on-surface mb-6">No path in progress</p>
            <a href="/catalog" class="px-6 py-3 bg-primary text-on-primary rounded-xl font-bold no-underline">Browse Catalog</a>
        </div>`;
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    try {
        const session = window.WisdomAuth.requireAuth();
        if (!session) return;
        const userId = session.user_id;
        let pathId = new URLSearchParams(window.location.search).get('path');

        // 1. Fetch data — a specific path if ?path= is given, else this user's
        // most-progressed real enrollment (never a global "latest generated"
        // path — that could belong to someone else, or be an unpublished draft).
        let path, progress;
        try {
            if (!pathId) {
                const enrolledRes = await fetch('/api/learning-path/enrolled?user_id=' + userId);
                if (enrolledRes.ok) {
                    const enrolled = (await enrolledRes.json()).enrolled_paths || [];
                    const best = enrolled.find(p => p.progress_pct < 100) || enrolled[0];
                    if (best) pathId = best.path_id;
                }
            }

            const [pathRes, progRes] = await Promise.all([
                pathId ? fetch('/api/learning-path/' + encodeURIComponent(pathId)) : Promise.resolve(null),
                WisdomAPI.getUserProgress(userId)
            ]);

            if (pathRes && pathRes.ok) path = await pathRes.json();
            progress = progRes || { completed_courses: [] };
        } catch(e) {
            console.error('API Error:', e);
            progress = { completed_courses: [] };
        }

        // No enrolled path (or the specific ?path= no longer exists) — show a
        // real empty state instead of a synthetic/generic curriculum.
        if (!path || !Array.isArray(path.courses) || path.courses.length === 0) {
            renderLearningPathEmptyState();
            return;
        }

        // 2. Setup Sets and Variables
        const completedSet = new Set(progress.completed_courses || []);
        let currentCourse = null;
        let activeLessonId = null;
        let activeCourseId = null;

        // Find the first uncompleted course and lesson
        for (const course of path.courses) {
            if (!completedSet.has(course.course_id)) {
                if (!currentCourse) currentCourse = course;
                // If it has lessons, the active lesson is the first one (since we don't track lesson-level completion perfectly yet in MVP, we just use the first lesson of the uncompleted course)
                if (course.lessons && course.lessons.length > 0 && !activeLessonId) {
                    activeCourseId = course.course_id;
                    activeLessonId = course.lessons[0].lesson_id;
                } else if (!activeCourseId) {
                    activeCourseId = course.course_id;
                }
                break;
            }
        }

        // 3. Update Title & Desc
        const titleText = path.title
            ? path.title
            : (path.source_document
                ? path.source_document.replace('.txt','').replace('.md','').replace(/_/g,' ')
                : 'Learning Path');
        document.getElementById('lp-title').textContent = titleText;
        const lpBreadcrumb = document.getElementById('lp-breadcrumb-path');
        if (lpBreadcrumb) lpBreadcrumb.textContent = titleText;
        document.getElementById('lp-desc').textContent = path.courses.length + ' courses • ' + (path.total_estimated_hours || '0') + 'h total';

        // A manager's own unpublished draft isn't an "active" path — nobody
        // (including them) is actually enrolled in it yet.
        const activeBadge = document.getElementById('lp-active-badge');
        if (activeBadge) {
            if (path.path_type === 'unofficial') {
                activeBadge.textContent = 'Draft — Not Published';
                activeBadge.className = 'bg-tertiary-fixed text-on-tertiary-fixed-variant text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider';
            } else {
                activeBadge.textContent = 'Active Path';
                activeBadge.className = 'bg-primary text-white text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider';
            }
        }

        // Update section title
        const sectionTitle = document.getElementById('lp-section-title');
        if (sectionTitle && currentCourse) {
            sectionTitle.textContent = currentCourse.title;
        }

        // 4. Render Nodes
        const container = document.getElementById('learning-path-container');
        container.innerHTML = '';
        let courseNumber = 0;

        path.courses.forEach((course) => {
            const isRemedial = course.is_remedial === true;
            if (!isRemedial) courseNumber++;

            // Course Header
            if (isRemedial) {
                container.innerHTML += `
                <div class="relative z-10 w-full max-w-lg my-2 mx-auto">
                    <div class="bg-amber-500 text-white p-4 rounded-2xl border-b-4 border-amber-700 flex justify-between items-center shadow-lg">
                        <div>
                            <p class="font-label-md text-xs opacity-80 uppercase tracking-widest flex items-center gap-1"><span class="material-symbols-outlined text-sm">auto_fix_high</span> Targeted Review</p>
                            <h3 class="font-headline-sm text-white text-base">${course.title}</h3>
                        </div>
                        <span class="material-symbols-outlined text-2xl">psychology</span>
                    </div>
                </div>
                `;
            } else {
                container.innerHTML += `
                <div class="relative z-10 w-full max-w-lg my-4 mx-auto">
                    <div class="bg-primary text-on-primary p-6 rounded-2xl border-b-4 border-blue-900 flex justify-between items-center shadow-lg">
                        <div>
                            <p class="font-label-md text-xs opacity-80 uppercase tracking-widest">Course ${courseNumber}</p>
                            <h3 class="font-headline-md text-white">${course.title}</h3>
                        </div>
                        <span class="material-symbols-outlined text-3xl">school</span>
                    </div>
                </div>
                `;
            }

            // Render lesson nodes
            const lessons = course.lessons || [];
            if (lessons.length === 0) {
                // Legacy course without lessons
                const isCompleted = completedSet.has(course.course_id);
                const isActive = activeCourseId === course.course_id && !activeLessonId;
                
                container.innerHTML += `
                <div class="relative flex flex-col items-center">
                    ${isActive ? '<div class="absolute -top-12 bg-secondary-container text-on-secondary-container px-3 py-1 rounded-lg text-xs font-bold animate-bounce shadow-md border border-secondary z-30">START HERE</div>' : ''}
                    <a href="/lesson?course=${course.course_id}" class="w-20 h-20 rounded-full ${isCompleted ? 'bg-primary' : 'bg-secondary-container'} flex items-center justify-center text-white squishy-button cursor-pointer border-4 border-white no-underline relative z-20" style="text-decoration:none">
                        <span class="material-symbols-outlined text-3xl">${isCompleted ? 'check' : 'play_arrow'}</span>
                    </a>
                    <span class="mt-3 font-bold text-on-surface-variant text-sm text-center px-4 relative z-20 bg-background/80 rounded-full">${course.title}</span>
                </div>
                `;
            } else {
                lessons.forEach((lesson) => {
                    const isActive = activeCourseId === course.course_id && activeLessonId === lesson.lesson_id;
                    const lessonBg = isRemedial ? 'bg-amber-100 border-amber-300 text-amber-800' : 'bg-secondary-container text-on-secondary-container border-white';
                    container.innerHTML += `
                    <div class="relative flex flex-col items-center group my-4">
                        ${isActive ? '<div class="absolute -top-12 bg-secondary-container text-on-secondary-container px-3 py-1 rounded-lg text-xs font-bold animate-bounce shadow-md border border-secondary z-30">START HERE</div>' : ''}
                        <a href="/lesson?course=${course.course_id}&lesson=${lesson.lesson_id}" class="w-20 h-20 rounded-full ${lessonBg} flex items-center justify-center squishy-button cursor-pointer border-4 hover:ring-4 transition-all no-underline relative z-20" style="text-decoration:none">
                            <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">${isRemedial ? 'manage_search' : 'menu_book'}</span>
                        </a>
                        <span class="mt-2 font-bold text-on-surface text-sm text-center px-2 max-w-[200px] relative z-20 bg-background/80 rounded-full">${lesson.title}</span>
                        <span class="text-xs text-on-surface-variant relative z-20 bg-background/80 rounded-full px-2">${lesson.estimated_minutes || 15} min</span>
                    </div>
                    `;
                });

                // Final Assessment node
                if (course.has_final_assessment !== false) {
                    const faColor = isRemedial
                        ? 'bg-amber-200 text-amber-900 border-white hover:ring-amber-200/30'
                        : 'bg-tertiary-container text-on-tertiary-container border-white hover:ring-tertiary-container/30';
                    const faLabel = isRemedial ? 'Re-Assessment' : 'Final Assessment';
                    container.innerHTML += `
                    <div class="relative flex flex-col items-center my-6">
                        <a href="/quiz?course=${course.course_id}&type=final_assessment" class="w-24 h-24 rounded-full ${faColor} flex items-center justify-center squishy-button cursor-pointer border-4 hover:ring-4 transition-all no-underline relative z-20" style="text-decoration:none">
                            <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
                        </a>
                        <span class="mt-3 font-bold text-sm px-3 py-1 rounded-full text-center relative z-20 ${isRemedial ? 'text-amber-700 bg-amber-100' : 'text-tertiary bg-tertiary-fixed/20'}">${faLabel}</span>
                    </div>
                    `;
                }
            }
        });

        // 5. Calculate Stats
        const totalCourses = path.courses.length;
        
        let completedCount = 0;
        let completedHours = 0;
        let totalHours = 0;
        path.courses.forEach(c => {
            const h = c.estimated_hours || 0;
            totalHours += h;
            if (completedSet.has(c.course_id)) {
                completedHours += h;
                completedCount++;
            }
        });
        
        const pct = totalCourses > 0 ? Math.round((completedCount / totalCourses) * 100) : 0;

        const pctEl = document.getElementById('lp-progress-pct');
        if (pctEl) pctEl.textContent = pct + '%';

        const barEl = document.getElementById('lp-progress-bar');
        if (barEl) barEl.style.width = pct + '%';

        const remainingHours = Math.max(0, totalHours - completedHours);

        const timeInvested = document.getElementById('lp-time-invested');
        if (timeInvested) timeInvested.textContent = completedHours.toFixed(1) + 'h';

        const timeRemaining = document.getElementById('lp-time-remaining');
        if (timeRemaining) timeRemaining.textContent = remainingHours.toFixed(1) + 'h';

        // 6. Calculate Weekly Goal (MVP: 1 course per week)
        const weeklyBars = document.getElementById('lp-weekly-bars');
        const weeklyText = document.getElementById('lp-weekly-text');
        if (weeklyBars && weeklyText) {
            weeklyBars.innerHTML = '';
            // For MVP, if they completed ANY course recently, we'll mark the goal as complete.
            // Since we don't track timestamps perfectly, we'll just say if completedCount > 0, they hit the weekly goal.
            const hasMetGoal = completedCount > 0;
            
            if (hasMetGoal) {
                weeklyText.textContent = "Great job! You've completed a course and hit your weekly goal!";
            } else {
                weeklyText.textContent = "Keep it up! Complete 1 course to reach your weekly goal.";
            }

            // Draw 4 segments for the month (1 per week)
            for (let i = 0; i < 4; i++) {
                if (i === 0 && hasMetGoal) {
                    weeklyBars.innerHTML += `<div class="flex-1 h-2 bg-on-tertiary-container/20 rounded-full"><div class="h-full bg-white rounded-full w-full"></div></div>`;
                } else {
                    weeklyBars.innerHTML += `<div class="flex-1 h-2 bg-on-tertiary-container/20 rounded-full"></div>`;
                }
            }
        }

    } catch (err) {
        console.error('Failed to load learning path', err);
    }
});
</script>
