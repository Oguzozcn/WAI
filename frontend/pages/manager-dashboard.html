<head>

<style>
  body { font-family: 'Inter', sans-serif; background: #f6fafd; color: #171c1f; }
  .font-display { font-family: 'Hanken Grotesk', sans-serif; }

  /* RAG badges */
  .rag-green  { background: #dcfce7; color: #15803d; }
  .rag-amber  { background: #fef3c7; color: #b45309; }
  .rag-red    { background: #fee2e2; color: #b91c1c; }
  .dark .rag-green  { background: rgba(20,83,45,.4); color: #86efac; }
  .dark .rag-amber  { background: rgba(120,53,15,.4); color: #fcd34d; }
  .dark .rag-red    { background: rgba(127,29,29,.4); color: #fca5a5; }

  /* Delta chips */
  .delta-pos  { background: #dcfce7; color: #15803d; }
  .delta-neg  { background: #fee2e2; color: #b91c1c; }
  .delta-neu  { background: #f1f5f9; color: #475569; }
  .dark .delta-pos  { background: rgba(20,83,45,.4); color: #86efac; }
  .dark .delta-neg  { background: rgba(127,29,29,.4); color: #fca5a5; }
  .dark .delta-neu  { background: #374151; color: #9ca3af; }

  /* Subtle card hover */
  .kpi-card { transition: box-shadow .2s, transform .2s; }
  .kpi-card:hover { box-shadow: 0 8px 24px rgba(0,87,135,.12); transform: translateY(-1px); }

  /* Skeleton shimmer */
  @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
  .skeleton {
    background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
    background-size: 800px 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 6px;
  }
  .dark .skeleton {
    background: linear-gradient(90deg, #374151 25%, #4b5563 50%, #374151 75%);
    background-size: 800px 100%;
  }

  /* Progress bar */
  .progress-bar { height: 6px; border-radius: 3px; background: #e2e8f0; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 3px; transition: width .6s ease; }
  .dark .progress-bar { background: #374151; }

  /* Table */
  .report-table { border-collapse: separate; border-spacing: 0; }
  .report-table th { background: #f0f4f7; font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; color: #404750; padding: .625rem 1rem; }
  .report-table th:first-child { border-radius: 8px 0 0 8px; }
  .report-table th:last-child  { border-radius: 0 8px 8px 0; }
  .report-table tr.report-row { transition: background .15s; }
  .report-table tr.report-row:hover td { background: #f0f4f7; }
  .report-table td { padding: .75rem 1rem; border-bottom: 1px solid #e9ecef; font-size: .875rem; }
  .dark .report-table th { background: #374151; color: #9ca3af; }
  .dark .report-table tr.report-row:hover td { background: #374151; }
  .dark .report-table td { border-bottom: 1px solid #374151; }

  /* Sidebar nav */
  .nav-link { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px;
              color: #404750; font-size: .875rem; font-weight: 500; transition: background .15s, color .15s; text-decoration: none; }
  .nav-link:hover, .nav-link.active { background: #cde5ff; color: #004a75; }
  .nav-link .material-symbols-outlined { font-size: 1.25rem; }

  /* Section reveal animation */
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:none } }
  .fade-up { animation: fadeUp .4s ease both; }
  .fade-up-2 { animation: fadeUp .4s .1s ease both; }
  .fade-up-3 { animation: fadeUp .4s .2s ease both; }
</style>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const wisdomSession = window.WisdomAuth.requireRole('manager');
const getManagerId  = () => wisdomSession ? wisdomSession.user_id : '';
const getDepartment = () => document.getElementById('dept-select').value;
const getRole       = () => wisdomSession ? wisdomSession.role : '';
if (wisdomSession) document.getElementById('manager-id-label').textContent = wisdomSession.user_id;

document.getElementById('export-excel-btn').addEventListener('click', () => {
  const managerId = getManagerId();
  const dept = getDepartment();
  window.location.href = `/api/manager/${encodeURIComponent(managerId)}/reports/export?department=${encodeURIComponent(dept)}&role=${encodeURIComponent(getRole())}`;
});

// ── Helpers ──────────────────────────────────────────────────────────────────
function ragClass(color) {
  return { green: 'rag-green', amber: 'rag-amber', red: 'rag-red' }[color] ?? 'rag-amber';
}
function ragIcon(color) {
  return { green: 'check_circle', amber: 'warning', red: 'dangerous' }[color] ?? 'help';
}
function fmtPct(v) { return v == null ? '—' : `${v.toFixed(1)}%`; }
function fmtScore(v) { return v == null ? '—' : (v * 100).toFixed(0); }

function deltaChip(delta, label) {
  if (delta == null) return '<span class="delta-neu text-xs px-2 py-0.5 rounded-full font-medium">No baseline</span>';
  const cls = delta >= 0 ? 'delta-pos' : 'delta-neg';
  const icon = delta >= 0 ? '▲' : '▼';
  return `<span class="${cls} text-xs px-2 py-0.5 rounded-full font-semibold">${icon} ${Math.abs(delta).toFixed(1)}% vs dept ${label}</span>`;
}

function kpiCard(icon, label, value, sub = '') {
  return `
    <div class="kpi-card bg-surface-container-lowest rounded-2xl border border-outline-variant p-4 flex flex-col gap-1 shadow-sm">
      <span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings:'FILL' 1">${icon}</span>
      <div class="font-display font-bold text-2xl text-on-surface">${value}</div>
      <div class="text-xs text-on-surface-variant font-medium">${label}</div>
      ${sub ? `<div class="text-xs text-on-surface-variant mt-0.5">${sub}</div>` : ''}
    </div>`;
}

// ── State ────────────────────────────────────────────────────────────────────
let _allReports = [];

// ── BUCKET 1: Team KPIs ──────────────────────────────────────────────────────
async function loadTeamKpis(managerId, dept) {
  const grid = document.getElementById('team-kpis-grid');
  const errEl = document.getElementById('team-error');
  const errMsg = document.getElementById('team-error-msg');
  const ragBadge = document.getElementById('rag-badge');

  grid.innerHTML = [1,2,3,4,5,6].map(() =>
    '<div class="skeleton h-24 rounded-xl"></div>'
  ).join('');
  errEl.classList.add('hidden');
  ragBadge.classList.add('hidden');

  try {
    const res = await fetch(`/api/manager/${encodeURIComponent(managerId)}/team-kpis?department=${dept}&role=${encodeURIComponent(getRole())}`);
    const d = await res.json();
    if (!res.ok) throw new Error(d.detail?.message ?? d.detail ?? 'Failed to load team KPIs');

    // RAG badge
    const rag = d.rag_status ?? 'amber';
    ragBadge.className = `ml-auto text-xs font-semibold px-3 py-1 rounded-full ${ragClass(rag)} flex items-center gap-1`;
    ragBadge.innerHTML = `<span class="material-symbols-outlined text-sm" style="font-variation-settings:'FILL' 1">${ragIcon(rag)}</span>${rag.toUpperCase()}`;
    ragBadge.classList.remove('hidden');

    grid.innerHTML = [
      kpiCard('groups',      'Team Size',        d.team_size),
      kpiCard('bolt',        'Active Learners',  d.active_learners),
      kpiCard('task_alt',    'Completed',        d.completed_count),
      kpiCard('percent',     'Avg Completion',   fmtPct(d.avg_completion_rate_pct)),
      kpiCard('star',        'Pass Rate',        fmtPct(d.pass_rate_pct)),
      kpiCard('warning',     'At Risk',          d.at_risk_count,
        d.top_gap_areas?.length ? 'Top gap: ' + d.top_gap_areas[0] : ''),
    ].join('');

  } catch (e) {
    grid.innerHTML = '';
    errMsg.textContent = e.message;
    errEl.classList.remove('hidden');
  }
}

// ── BUCKET 2: Individual Reports ─────────────────────────────────────────────
async function loadReports(managerId, dept) {
  const tbody = document.getElementById('reports-tbody');
  const errEl = document.getElementById('reports-error');
  const subtitle = document.getElementById('reports-subtitle');

  tbody.innerHTML = `<tr><td colspan="6" class="py-6 text-center text-on-surface-variant text-sm">Loading…</td></tr>`;
  errEl.classList.add('hidden');

  try {
    const res = await fetch(`/api/manager/${encodeURIComponent(managerId)}/reports?department=${dept}&role=${encodeURIComponent(getRole())}`);
    const d = await res.json();
    if (!res.ok) throw new Error(d.detail?.message ?? d.detail ?? 'Failed to load reports');

    _allReports = d.reports ?? [];
    subtitle.textContent = `${d.report_count} direct report${d.report_count !== 1 ? 's' : ''}`;
    renderReports(_allReports);

  } catch (e) {
    tbody.innerHTML = '';
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  }
}

function renderReports(rows) {
  const tbody = document.getElementById('reports-tbody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="py-8 text-center text-on-surface-variant text-sm">No records found.</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const rag = r.rag_color ?? 'amber';
    const pct = r.completion_rate_pct ?? 0;
    const fillColor = rag === 'green' ? '#22c55e' : rag === 'amber' ? '#f59e0b' : '#ef4444';
    const atRiskBadge = r.is_at_risk
      ? `<span class="rag-red text-xs px-2 py-0.5 rounded-full font-semibold ml-1">At Risk</span>` : '';

    return `
      <tr class="report-row" data-name="${r.display_name}" data-status="${r.status}">
        <td>
          <div class="flex items-center gap-2">
            <div class="w-7 h-7 rounded-full bg-secondary-container text-on-secondary flex items-center justify-center font-bold text-xs shrink-0">
              ${(r.display_name || r.user_id || '?')[0].toUpperCase()}
            </div>
            <div>
              <div class="font-medium text-on-surface">${r.display_name || r.user_id}</div>
              <div class="text-xs text-on-surface-variant capitalize">${r.job_level?.replace('_',' ') ?? '—'}</div>
            </div>
          </div>
        </td>
        <td>${r.status}${atRiskBadge}</td>
        <td class="text-on-surface-variant">${r.current_course_title || '<span class="italic opacity-60">—</span>'}</td>
        <td class="text-right min-w-[120px]">
          <div class="flex items-center justify-end gap-2">
            <div class="progress-bar w-20">
              <div class="progress-bar-fill" style="width:${pct}%;background:${fillColor}"></div>
            </div>
            <span class="font-semibold text-xs w-10 text-right">${pct.toFixed(1)}%</span>
          </div>
        </td>
        <td class="text-right font-semibold">${fmtScore(r.readiness_score)}<span class="text-on-surface-variant font-normal">/100</span></td>
        <td class="text-center">
          <span class="material-symbols-outlined text-xl" style="font-variation-settings:'FILL' 1;color:${fillColor}">${ragIcon(rag)}</span>
        </td>
      </tr>`;
  }).join('');
}

function filterReports(query) {
  if (!query.trim()) { renderReports(_allReports); return; }
  const q = query.toLowerCase();
  renderReports(_allReports.filter(r =>
    (r.display_name || '').toLowerCase().includes(q) ||
    (r.status || '').toLowerCase().includes(q) ||
    (r.user_id || '').toLowerCase().includes(q)
  ));
}

// ── BUCKET 3: Strategic ───────────────────────────────────────────────────────
async function loadStrategic(managerId, dept) {
  const grid = document.getElementById('strategic-grid');
  const errEl = document.getElementById('strategic-error');
  const dateLabel = document.getElementById('strategic-date-label');

  grid.innerHTML = `<div class="skeleton h-44 rounded-2xl"></div><div class="skeleton h-44 rounded-2xl"></div>`;
  errEl.classList.add('hidden');

  try {
    const res = await fetch(`/api/manager/${encodeURIComponent(managerId)}/strategic?department=${dept}&role=${encodeURIComponent(getRole())}`);
    const d = await res.json();
    if (!res.ok) throw new Error(d.detail?.message ?? d.detail ?? 'Failed to load strategic data');

    dateLabel.textContent = d.report_date ? `as of ${d.report_date}` : '';

    const compDelta = deltaChip(d.delta?.completion_pct, 'avg');
    const rdeltaLabel = d.delta?.readiness !== undefined
      ? deltaChip(parseFloat((d.delta.readiness * 100).toFixed(1)), 'avg') : '';

    grid.innerHTML = `
      <!-- Completion comparison -->
      <div class="bg-surface-container-lowest rounded-2xl border border-outline-variant p-5 shadow-sm kpi-card">
        <div class="flex items-center gap-2 mb-4">
          <span class="material-symbols-outlined text-primary" style="font-variation-settings:'FILL' 1">task_alt</span>
          <span class="font-semibold text-on-surface">Completion Rate</span>
        </div>
        <div class="flex items-end justify-between mb-3">
          <div>
            <div class="text-3xl font-display font-bold text-on-surface">${fmtPct(d.team?.avg_completion_rate_pct)}</div>
            <div class="text-xs text-on-surface-variant mt-0.5">Your Team</div>
          </div>
          <div class="text-right">
            <div class="text-xl font-display font-semibold text-on-surface-variant">${fmtPct(d.department_baseline?.avg_completion_rate_pct)}</div>
            <div class="text-xs text-on-surface-variant mt-0.5">Dept Avg</div>
          </div>
        </div>
        ${compDelta}
        ${!d.kpi_payload_found ? '<p class="text-xs text-on-surface-variant mt-2 italic">No KPI payload for today — showing live data.</p>' : ''}
      </div>

      <!-- Readiness comparison -->
      <div class="bg-surface-container-lowest rounded-2xl border border-outline-variant p-5 shadow-sm kpi-card">
        <div class="flex items-center gap-2 mb-4">
          <span class="material-symbols-outlined text-secondary" style="font-variation-settings:'FILL' 1">psychology</span>
          <span class="font-semibold text-on-surface">Readiness Score</span>
        </div>
        <div class="flex items-end justify-between mb-3">
          <div>
            <div class="text-3xl font-display font-bold text-on-surface">${fmtScore(d.team?.avg_readiness_score)}<span class="text-lg text-on-surface-variant">/100</span></div>
            <div class="text-xs text-on-surface-variant mt-0.5">Your Team</div>
          </div>
          <div class="text-right">
            <div class="text-xl font-display font-semibold text-on-surface-variant">${fmtScore(d.department_baseline?.avg_readiness_score)}<span class="text-sm">/100</span></div>
            <div class="text-xs text-on-surface-variant mt-0.5">Dept Avg</div>
          </div>
        </div>
        ${rdeltaLabel}
        ${!d.kpi_payload_found ? '<p class="text-xs text-on-surface-variant mt-2 italic">No KPI payload for today — showing live data.</p>' : ''}
      </div>
    `;

  } catch (e) {
    grid.innerHTML = '';
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  }
}

// ── Orchestrator ──────────────────────────────────────────────────────────────
async function loadAll() {
  const managerId = getManagerId();
  const dept = getDepartment();
  await Promise.all([
    loadTeamKpis(managerId, dept),
    loadReports(managerId, dept),
    loadStrategic(managerId, dept),
  ]);
}

// Auto-load on page ready
document.addEventListener('DOMContentLoaded', loadAll);
</script>
</body>
</html>
