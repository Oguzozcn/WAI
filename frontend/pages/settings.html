<body class="bg-background text-on-background font-body-md min-h-screen flex">
    <script src="/js/auth.js"></script>
    <!-- SideNavBar (shared component) -->
    <div id="sidebar-mount"></div>
    <!-- Main Content Wrapper -->
    <div class="flex-1 flex flex-col w-full min-w-0 relative">
        <!-- TopAppBar -->
        <header
            class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop h-20 sticky top-0 z-50 bg-surface border-b border-outline-variant sidebar-offset sidebar-offset-header">
            <div class="flex items-center gap-4">
                <button id="mobile-menu-btn" class="md:hidden p-2">
                    <span class="material-symbols-outlined">menu</span>
                </button>
            </div>
            <div class="flex items-center gap-3">
                <img id="profile-avatar" alt="User profile avatar" class="w-10 h-10 rounded-full border-2 border-primary object-cover"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuCQsLx4P-wDSGQt3OQrRZc8HYdX1FUO1QKbzEN2_sXu1L3yHjY41XJHgf6jksbMkfF3iFJhIZkBR1FrSNjZEVDd9TQWSigo7Nfq9JTNGt_1tIBjS3ZEfi_hulmdTwU9wMLbuuInpw5eg33JGvL_GAkgT8JIU0MGFhBNN1gBIS5gOUIKk6Ddh-ewjIJV2n8x3As-hOphiIJPTN0Nc9oUU5bn8rRBGU5r3C5nQhT2XPuTA60EqYNGCExY">
            </div>
        </header>
        <!-- Page Content -->
        <main class="flex-1 w-full max-w-[720px] mx-auto p-margin-mobile md:p-margin-desktop sidebar-offset">
            <div class="mb-8">
                <h2 class="font-headline-lg text-headline-lg text-on-surface">Settings</h2>
                <p class="font-body-lg text-body-lg text-on-surface-variant mt-2">Your account and app preferences.</p>
            </div>

            <!-- Account -->
            <section class="bg-surface-container-lowest border border-outline-variant rounded-lg shadow-sm p-6 mb-6">
                <h3 class="font-headline-md text-lg text-on-surface mb-4">Account</h3>
                <dl class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <dt class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider mb-1">Name</dt>
                        <dd id="settings-display-name" class="text-on-surface font-medium">—</dd>
                    </div>
                    <div>
                        <dt class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider mb-1">Role</dt>
                        <dd id="settings-role" class="text-on-surface font-medium">—</dd>
                    </div>
                    <div>
                        <dt class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider mb-1">User ID</dt>
                        <dd id="settings-user-id" class="text-on-surface font-medium">—</dd>
                    </div>
                </dl>
                <p class="text-xs text-on-surface-variant mt-4">Account details are managed by your organization for this demo environment.</p>
            </section>

            <!-- Appearance -->
            <section class="bg-surface-container-lowest border border-outline-variant rounded-lg shadow-sm p-6 mb-6">
                <h3 class="font-headline-md text-lg text-on-surface mb-4">Appearance</h3>
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-on-surface font-medium">Theme</p>
                        <p class="text-xs text-on-surface-variant">Switch between light and dark mode.</p>
                    </div>
                    <button id="settings-theme-toggle" type="button"
                        class="flex items-center gap-2 px-4 py-2 rounded-full bg-surface-container-low hover:bg-surface-container-high border border-outline-variant text-sm font-bold text-on-surface transition-colors">
                        <span class="material-symbols-outlined text-[18px]" id="settings-theme-icon">dark_mode</span>
                        <span id="settings-theme-label">Dark mode</span>
                    </button>
                </div>
            </section>

            <!-- Session -->
            <section class="bg-surface-container-lowest border border-outline-variant rounded-lg shadow-sm p-6">
                <h3 class="font-headline-md text-lg text-on-surface mb-4">Session</h3>
                <button id="settings-logout-btn" type="button"
                    class="flex items-center gap-2 px-4 py-2 rounded-full bg-error-container text-on-error-container text-sm font-bold hover:opacity-90 transition-opacity">
                    <span class="material-symbols-outlined text-[18px]">logout</span> Log out
                </button>
            </section>
        </main>
    </div>

    <script src="/js/sidebar.js"></script>
    <script>
        (function () {
            const session = window.WisdomAuth.requireAuth();
            if (!session) return;

            const roleLabels = { manager: 'Manager', developer: 'Developer', individual_contributor: 'Employee' };
            document.getElementById('settings-display-name').textContent = session.display_name || session.user_id;
            document.getElementById('settings-role').textContent = roleLabels[session.role] || session.role || '—';
            document.getElementById('settings-user-id').textContent = session.user_id;

            const profileAvatar = document.getElementById('profile-avatar');
            if (profileAvatar) profileAvatar.addEventListener('click', () => { window.location.href = '/settings'; });

            function syncThemeButton() {
                const dark = window.WisdomSidebar.isDarkMode();
                document.getElementById('settings-theme-icon').textContent = dark ? 'light_mode' : 'dark_mode';
                document.getElementById('settings-theme-label').textContent = dark ? 'Light mode' : 'Dark mode';
            }
            syncThemeButton();
            document.getElementById('settings-theme-toggle').addEventListener('click', () => {
                window.WisdomSidebar.applyTheme(!window.WisdomSidebar.isDarkMode());
                syncThemeButton();
            });

            document.getElementById('settings-logout-btn').addEventListener('click', () => {
                window.WisdomAuth.logout();
            });
        })();
    </script>
