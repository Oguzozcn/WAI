<!DOCTYPE html>
<html lang="en" style="">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WisdomAI | Sign In</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500;700&amp;family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&amp;display=block"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">try {
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        "colors": {
                            "surface-dim": "#d6dbdd",
                            "on-secondary-container": "#004966",
                            "surface": "#f6fafd",
                            "on-surface": "#171c1f",
                            "on-error-container": "#93000a",
                            "inverse-primary": "#95ccff",
                            "error-container": "#ffdad6",
                            "secondary-fixed": "#c5e7ff",
                            "tertiary": "#255f00",
                            "on-secondary": "#ffffff",
                            "primary-container": "#0070ad",
                            "primary": "#005787",
                            "on-primary": "#ffffff",
                            "inverse-surface": "#2c3134",
                            "on-tertiary": "#ffffff",
                            "surface-bright": "#f6fafd",
                            "on-primary-fixed": "#001d32",
                            "secondary-container": "#2abcfd",
                            "on-primary-fixed-variant": "#004a75",
                            "surface-container": "#eaeef1",
                            "surface-container-lowest": "#ffffff",
                            "on-secondary-fixed": "#001e2d",
                            "primary-fixed": "#cde5ff",
                            "tertiary-container": "#327a00",
                            "on-secondary-fixed-variant": "#004c6a",
                            "surface-container-low": "#f0f4f7",
                            "surface-container-high": "#e5e9ec",
                            "secondary-fixed-dim": "#80d0ff",
                            "on-tertiary-container": "#bbff92",
                            "surface-container-highest": "#dfe3e6",
                            "on-tertiary-fixed-variant": "#1f5100",
                            "tertiary-fixed-dim": "#6be026",
                            "on-error": "#ffffff",
                            "surface-variant": "#dfe3e6",
                            "primary-fixed-dim": "#95ccff",
                            "on-background": "#171c1f",
                            "surface-tint": "#00639a",
                            "error": "#ba1a1a",
                            "tertiary-fixed": "#87fe45",
                            "on-primary-container": "#e0eeff",
                            "on-tertiary-fixed": "#082100",
                            "outline": "#707881",
                            "inverse-on-surface": "#edf1f4",
                            "secondary": "#00658c",
                            "background": "#f6fafd",
                            "on-surface-variant": "#404750",
                            "outline-variant": "#c0c7d1"
                        },
                        "borderRadius": {
                            "DEFAULT": "0.25rem",
                            "lg": "0.5rem",
                            "xl": "0.75rem",
                            "full": "9999px"
                        },
                        "spacing": {
                            "unit": "4px",
                            "margin-desktop": "40px",
                            "card-gap": "20px",
                            "gutter": "24px",
                            "margin-mobile": "16px"
                        },
                        "fontFamily": {
                            "headline-lg-mobile": ["Hanken Grotesk"],
                            "stats-number": ["Hanken Grotesk"],
                            "headline-lg": ["Hanken Grotesk"],
                            "display-lg": ["Hanken Grotesk"],
                            "body-md": ["Inter"],
                            "body-lg": ["Inter"],
                            "headline-md": ["Hanken Grotesk"],
                            "label-md": ["JetBrains Mono"]
                        },
                        "fontSize": {
                            "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                            "stats-number": ["24px", { "lineHeight": "24px", "fontWeight": "800" }],
                            "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "700" }],
                            "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                            "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                            "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                            "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                            "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500" }]
                        }
                    }
                }
            }
        } catch (_e) { }</script>
</head>

<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center px-margin-mobile">
    <div class="w-full max-w-[420px]">
        <div class="flex flex-col items-center gap-2 mb-8">
            <img alt="WisdomAI Logo" class="w-10 h-10 object-contain"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBLLiZQ4Ntu9A6ncb0b-E0Z2bUUjP3ezD1hhJPpUsyGV3wYannVJU77x55EdLqWY8dEPo17cpHoe6dep3b0fyEVpmT7UPiXW1JO3vETEUa9EvxG5QUbo4NLLJ2bbhHEoSYB4DYrjfSVNCBD6UjacfrxrrYZBk0Z6H5N55fBhjqDlny7miBSCajGdNDRfuNWAau1E77XKe3k9xxmCgWFU8xbaiU4s9013wpuMvUw71_gGZjrOzQ323xXMGCSLTM0UUe4lQ">
            <span class="font-headline-md text-headline-md font-extrabold text-primary">WisdomAI</span>
        </div>

        <div class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-lg p-8">
            <h1 class="font-headline-lg text-headline-lg text-on-surface mb-1">Sign in</h1>
            <p class="font-body-md text-body-md text-on-surface-variant mb-6">Use your WisdomAI account to continue.</p>

            <div id="login-error"
                class="hidden mb-4 px-4 py-3 rounded-xl bg-error-container text-on-error-container text-sm font-medium">
            </div>

            <form id="login-form" class="space-y-4">
                <div>
                    <label for="user-id" class="block font-label-md text-label-md text-on-surface-variant mb-1">User
                        ID</label>
                    <input id="user-id" name="user_id" type="text" autocomplete="username" required
                        placeholder="e.g. manager"
                        class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary">
                </div>
                <div>
                    <label for="password" class="block font-label-md text-label-md text-on-surface-variant mb-1">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required
                        placeholder="••••••••"
                        class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary">
                </div>
                <button id="login-submit" type="submit"
                    class="w-full bg-primary text-on-primary font-bold rounded-full py-3 text-sm hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
                    <span id="login-submit-label">Sign In</span>
                    <span id="login-submit-spinner"
                        class="hidden material-symbols-outlined text-base animate-spin">progress_activity</span>
                </button>
            </form>
        </div>

        <div class="mt-6 bg-surface-container-lowest border border-outline-variant rounded-xl p-4">
            <p class="font-label-md text-label-md text-on-surface-variant mb-3">Test accounts</p>
            <div class="space-y-2">
                <div class="flex items-center justify-between gap-3 text-xs">
                    <span class="text-on-surface-variant">Manager (Jordan Lee)</span>
                    <span class="font-mono text-on-surface bg-surface-container-low rounded px-2 py-1">manager / manager123</span>
                </div>
                <div class="flex items-center justify-between gap-3 text-xs">
                    <span class="text-on-surface-variant">Employee (Alex Chen)</span>
                    <span class="font-mono text-on-surface bg-surface-container-low rounded px-2 py-1">emp_001 / alex123</span>
                </div>
                <div class="flex items-center justify-between gap-3 text-xs">
                    <span class="text-on-surface-variant">Employee (Maria Santos)</span>
                    <span class="font-mono text-on-surface bg-surface-container-low rounded px-2 py-1">emp_002 / maria123</span>
                </div>
                <div class="flex items-center justify-between gap-3 text-xs">
                    <span class="text-on-surface-variant">Developer (Sam Rivera)</span>
                    <span class="font-mono text-on-surface bg-surface-container-low rounded px-2 py-1">developer / dev123</span>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/theme-toggle.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        (function () {
            const form = document.getElementById('login-form');
            const errorBox = document.getElementById('login-error');
            const submitBtn = document.getElementById('login-submit');
            const submitLabel = document.getElementById('login-submit-label');
            const submitSpinner = document.getElementById('login-submit-spinner');

            function landingPageFor(role) {
                if (role === 'manager') return '/manager-dashboard';
                if (role === 'developer') return '/dev-console';
                return '/';
            }

            // Already logged in this tab? Skip straight past the login form.
            const existing = window.WisdomAuth.getSession();
            if (existing) {
                window.location.href = landingPageFor(existing.role);
                return;
            }

            function setBusy(busy) {
                submitBtn.disabled = busy;
                submitBtn.classList.toggle('opacity-60', busy);
                submitLabel.textContent = busy ? 'Signing in…' : 'Sign In';
                submitSpinner.classList.toggle('hidden', !busy);
            }

            function showError(message) {
                errorBox.textContent = message;
                errorBox.classList.remove('hidden');
            }

            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                errorBox.classList.add('hidden');
                setBusy(true);
                const userId = document.getElementById('user-id').value.trim();
                const password = document.getElementById('password').value;
                try {
                    const session = await window.WisdomAuth.login(userId, password);
                    const params = new URLSearchParams(window.location.search);
                    const next = params.get('next');
                    window.location.href = next || landingPageFor(session.role);
                } catch (err) {
                    showError(err.message || 'Sign in failed.');
                    setBusy(false);
                }
            });
        })();
    </script>
</body>

</html>
