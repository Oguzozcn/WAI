<body class="bg-background text-on-background h-screen flex overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
    <script src="/js/auth.js"></script>
<!-- SideNavBar (shared component) -->
<div id="sidebar-mount"></div>
<!-- Main Content Area -->
<div class="flex-1 flex flex-col sidebar-offset relative w-full h-full">
<!-- TopAppBar (Shared Component) -->
<header class="flex justify-between items-center w-full px-margin-desktop h-16 border-b border-outline-variant bg-surface shrink-0 z-10 sticky top-0">
<div class="flex items-center gap-4">

</div>
<div class="flex items-center gap-4">

</div>
</header>
<!-- Chat History Scrollable Area -->
<main class="flex-1 overflow-y-auto p-4 md:p-gutter pb-32 flex flex-col gap-6" id="chat-container">
<!-- AI Welcome Message -->
<div class="flex gap-4 max-w-3xl mx-auto w-full">
<div class="w-10 h-10 rounded-full bg-primary flex-shrink-0 flex items-center justify-center text-on-primary shadow-sm">

</div>
<div class="flex flex-col gap-1">
<span class="font-label-md text-label-md text-on-surface-variant">WisdomAI</span>
<div class="bg-surface-container-lowest border border-outline-variant p-4 rounded-xl rounded-tl-sm shadow-sm text-body-md font-body-md text-on-surface">
<p>Hi! Ask me anything about your learning path, quizzes, or the knowledge base.</p>
</div>
<div id="suggested-prompts" class="flex flex-wrap gap-2 mt-1">
<button class="suggested-prompt-chip bg-surface-container-low border border-outline-variant hover:border-primary rounded-full px-4 py-2 text-sm text-on-surface-variant hover:text-primary transition-colors" data-prompt="What's in my learning path?" type="button">What's in my learning path?</button>
<button class="suggested-prompt-chip bg-surface-container-low border border-outline-variant hover:border-primary rounded-full px-4 py-2 text-sm text-on-surface-variant hover:text-primary transition-colors" data-prompt="Quiz me on my current course" type="button">Quiz me on my current course</button>
<button class="suggested-prompt-chip bg-surface-container-low border border-outline-variant hover:border-primary rounded-full px-4 py-2 text-sm text-on-surface-variant hover:text-primary transition-colors" data-prompt="Summarize the latest upload" type="button">Summarize the latest upload</button>
<button class="suggested-prompt-chip bg-surface-container-low border border-outline-variant hover:border-primary rounded-full px-4 py-2 text-sm text-on-surface-variant hover:text-primary transition-colors" data-prompt="What should I learn next?" type="button">What should I learn next?</button>

                     </span>

<button class="p-3 bg-primary text-on-primary hover:bg-primary-container rounded-lg transition-colors shrink-0 shadow-[0_2px_0_0_#004a75] active:translate-y-[2px] active:shadow-none ml-2" id="send-btn">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>

<p class="text-xs text-outline font-body-md">WisdomAI can make mistakes. Consider verifying important information.</p>
</div>
</div>

<!-- Scripts for interaction -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Sidebar (incl. mobile show/hide) is handled by the shared /js/sidebar.js.

            // Chat wiring
            const textarea = document.querySelector('textarea');
            const typingIndicator = document.getElementById('typing-indicator');
            const sendBtn = document.getElementById('send-btn');
            const chatContainer = document.getElementById('chat-container');
            const suggestedPrompts = document.getElementById('suggested-prompts');

            const session = window.WisdomAuth.requireAuth();
            if (!session) return;
            const USER_ID = session.user_id;
            const DEPARTMENT = 'operations';

            const scrollToBottom = () => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            };

            const appendUserMessage = (text) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'flex gap-4 max-w-3xl mx-auto w-full flex-row-reverse';
                wrapper.innerHTML = `
                    <img alt="User profile photo" class="w-10 h-10 rounded-full border border-outline-variant object-cover flex-shrink-0" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAaTpo3S-OJISsHtE4kCySk80yaGck9jSJaYivxvcSZfujXtdSWefeaXScAyll84kiL87_m4Vc1bmvH0EHa-YiaJ9AoOVHyD2Yz76tQmuKCc7YK7hHLBNngYsf3he-6W2M0bqo0Ty8vb6psJLPH_0fI810XZ8DdIkx6Klw5C_dCdYJTuwz6MmGer1K00vth60sxssM40QTVV9StnztHadXTAExV0tZ_d7Yop1OyOBsIULz0ABb5nM9m"/>
                    <div class="flex flex-col gap-1 items-end">
                        <span class="font-label-md text-label-md text-on-surface-variant">You</span>
                        <div class="bg-primary-container text-on-primary-container p-4 rounded-xl rounded-tr-sm shadow-[0_2px_0_0_#004a75] text-body-md font-body-md"></div>
                    </div>`;
                const bubble = wrapper.querySelector('.bg-primary-container');
                const p = document.createElement('p');
                p.textContent = text;
                bubble.appendChild(p);
                chatContainer.insertBefore(wrapper, typingIndicator);
            };

            const appendAiMessage = (text) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'flex gap-4 max-w-3xl mx-auto w-full';
                wrapper.innerHTML = `
                    <div class="w-10 h-10 rounded-full bg-primary flex-shrink-0 flex items-center justify-center text-on-primary shadow-sm">
                        <span class="material-symbols-outlined">school</span>
                    </div>
                    <div class="flex flex-col gap-1">
                        <span class="font-label-md text-label-md text-on-surface-variant">WisdomAI</span>
                        <div class="bg-surface-container-lowest border border-outline-variant p-4 rounded-xl rounded-tl-sm shadow-sm text-body-md font-body-md text-on-surface whitespace-pre-wrap"></div>
                    </div>`;
                const bubble = wrapper.querySelector('.bg-surface-container-lowest');
                const p = document.createElement('p');
                p.textContent = text;
                bubble.appendChild(p);
                chatContainer.insertBefore(wrapper, typingIndicator);
            };

            const sendMessage = async () => {
                const text = textarea.value.trim();
                if (text === '') return;

                textarea.value = '';
                textarea.style.height = '';
                appendUserMessage(text);
                if (suggestedPrompts) suggestedPrompts.classList.add('hidden');
                typingIndicator.classList.remove('hidden');
                scrollToBottom();

                try {
                    const res = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: USER_ID, department: DEPARTMENT, message: text }),
                    });
                    typingIndicator.classList.add('hidden');
                    if (!res.ok) throw new Error('Request failed');
                    const data = await res.json();
                    appendAiMessage(data.reply || '');
                } catch (err) {
                    typingIndicator.classList.add('hidden');
                    appendAiMessage('Sorry, something went wrong. Please try again.');
                }
                scrollToBottom();
            };

            sendBtn.addEventListener('click', sendMessage);

            if (suggestedPrompts) {
                suggestedPrompts.querySelectorAll('.suggested-prompt-chip').forEach((chip) => {
                    chip.addEventListener('click', () => {
                        textarea.value = chip.dataset.prompt;
                        textarea.focus();
                        sendMessage();
                    });
                });
            }

            textarea.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        });
    </script>
<script src="/js/api-client.js"></script>
