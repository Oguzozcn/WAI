<script src="/js/api-client.js"></script>
<script src="/js/sidebar.js"></script>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    try {
        const session = window.WisdomAuth.requireAuth();
        if (!session) return;
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('course') || 'course_03';
        const lessonId = urlParams.get('lesson');

        let courseMeta = null;
        let lessonData = null;
        let lessonContent = '';
        let totalCourses = 1;
        let courseIdx = 0;
        let pathId = urlParams.get('path') || '';

        // Try to fetch dynamic lesson content first
        const userId = urlParams.get('user') || session.user_id;

        // Mark this course as the user's in-progress course (fire-and-forget).
        WisdomAPI.updateProgress(userId, 'course_started', { course_id: courseId }).catch(() => {});

        if (lessonId) {
            try {
                const res = await fetch(`/api/lesson/${courseId}/${lessonId}?user_id=${userId}`);
                if (res.ok) {
                    const data = await res.json();
                    courseMeta = data.course;
                    lessonData = data.lesson;
                    if (!pathId && data.path_id) pathId = data.path_id;
                    // Remedial lessons use content_summary + key_points instead of content
                    if (lessonData) {
                        if (!lessonData.content && lessonData.content_summary) {
                            const parts = [lessonData.content_summary];
                            if (lessonData.key_points && lessonData.key_points.length) {
                                parts.push(lessonData.key_points.map(p => `- ${p}`).join('\n'));
                            }
                            lessonData.content = parts.join('\n\n');
                        }
                    }
                    lessonContent = lessonData ? lessonData.content : (courseMeta.content || '');
                    totalCourses = courseMeta.lessons ? courseMeta.lessons.length : 1;
                    courseIdx = lessonData ? (lessonData.order - 1) : 0;
                }
            } catch(e) { console.log('Dynamic lesson fetch failed, falling back.'); }
        }

        // Fallback to original API
        if (!courseMeta) {
            const [path, progress, kbRes] = await Promise.all([
                WisdomAPI.getLearningPath(userId),
                WisdomAPI.getUserProgress(userId),
                fetch('/api/kb/documents').then(r => r.json())
            ]);

            totalCourses = path.courses.length;
            courseMeta = path.courses.find(c => c.course_id === courseId);
            courseIdx = path.courses.findIndex(c => c.course_id === courseId);

            if (courseMeta) {
                const courseDoc = kbRes.documents.find(d => d.title === courseMeta.title);
                lessonContent = courseDoc ? courseDoc.content : courseMeta.description;
            }
        }

        if (courseMeta) {
            const titleText = lessonData ? lessonData.title : courseMeta.title;

            // Title
            const titleEl = document.getElementById('lesson-title');
            if (titleEl) titleEl.textContent = titleText;

            // Breadcrumb
            const breadcrumb = document.getElementById('lesson-breadcrumb');
            if (breadcrumb) breadcrumb.textContent = titleText;

            // Unit label
            const unitLabel = document.getElementById('lesson-unit-label');
            if (unitLabel) unitLabel.textContent = lessonData
                ? `Lesson ${lessonData.order} of ${totalCourses}`
                : `Lesson ${courseIdx + 1} of ${totalCourses}`;

            // Estimated time
            const estTime = document.getElementById('lesson-est-time');
            if (estTime) estTime.textContent = lessonData
                ? `${lessonData.estimated_minutes} min`
                : `${courseMeta.estimated_hours}h est.`;

            // Progress bar & text (simple linear progress)
            const progressPct = lessonData ? Math.round((lessonData.order / totalCourses) * 100) : 0;
            const progressBar = document.getElementById('lesson-progress-bar');
            if (progressBar) progressBar.style.width = progressPct + '%';
            const progressText = document.getElementById('lesson-progress-text');
            if (progressText) progressText.textContent = progressPct + '% Done';

            // Main content
            const contentEl = document.getElementById('lesson-content');
            if (contentEl && lessonContent) {
                let formatted = lessonContent
                    .replace(/## (.*)/g, '<h2 class="font-headline-md text-headline-md text-on-surface mb-4 mt-8">$1</h2>')
                    .replace(/### (.*)/g, '<h3 class="font-headline-md text-on-surface mb-3 mt-6">$1</h3>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/```python([\s\S]*?)```/g, '<pre class="bg-surface-container-low p-4 rounded-xl overflow-x-auto my-4 text-sm font-label-md"><code>$1</code></pre>')
                    .replace(/- \*\*(.*?)\*\*: (.*)/g, '<li class="flex gap-3 mb-3"><span class="material-symbols-outlined text-primary mt-1">check_circle</span><span><strong>$1</strong>: $2</span></li>')
                    .replace(/- \*\*(.*?)\*\*/g, '<li class="flex gap-3 mb-3"><span class="material-symbols-outlined text-primary mt-1">check_circle</span><span><strong>$1</strong></span></li>');

                formatted = formatted.split('\n\n').map(p => {
                    p = p.trim();
                    if (!p) return '';
                    if (p.startsWith('<h') || p.startsWith('<pre') || p.startsWith('<li') || p.startsWith('<ul')) return p;
                    if (p.startsWith('1.') || p.startsWith('- ')) return p;
                    return '<p class="text-body-lg text-on-surface-variant mb-4 leading-relaxed">' + p + '</p>';
                }).join('\n');

                contentEl.innerHTML = formatted;
            }

            // Key concepts sidebar (for dynamic lessons)
            if (lessonData && lessonData.key_concepts && lessonData.key_concepts.length > 0) {
                const sidebar = document.getElementById('lesson-sidebar-progress');
                if (sidebar) {
                    let sidebarHtml = '<div class="absolute left-[15px] top-2 bottom-2 w-0.5 bg-surface-variant"></div>';
                    lessonData.key_concepts.forEach((concept, i) => {
                        sidebarHtml += `
                        <div class="relative flex items-center gap-4">
                            <div class="absolute left-[-23px] w-[18px] h-[18px] rounded-full bg-primary-fixed flex items-center justify-center">
                                <span class="material-symbols-outlined text-[12px] text-primary">lightbulb</span>
                            </div>
                            <div class="flex-1">
                                <p class="font-label-md text-label-md text-primary">Key Concept ${i + 1}</p>
                                <p class="font-body-md text-on-surface">${concept}</p>
                            </div>
                        </div>`;
                    });
                    sidebar.innerHTML = sidebarHtml;
                }
            }
        }

        // Wire up the Start Quiz button
        const startQuizBtn = document.getElementById('start-quiz-btn');
        if (startQuizBtn && courseMeta) {
            startQuizBtn.addEventListener('click', () => {
                const pathParam = pathId ? `&path=${encodeURIComponent(pathId)}` : '';
                if (lessonId) {
                    window.location.href = `/quiz?course=${courseId}&lesson=${lessonId}&type=short_quiz${pathParam}`;
                } else {
                    window.location.href = `/quiz?course=${courseId}&type=short_quiz${pathParam}`;
                }
            });
        }

    } catch (err) {
        console.error('Failed to load lesson', err);
    }
});
</script>
