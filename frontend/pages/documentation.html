<!DOCTYPE html>
<html class="light" lang="en">
<head>
<script>(function(){try{var t=localStorage.getItem('wai-theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme: dark)').matches)){document.documentElement.classList.add('dark')}}catch(e){}})();</script>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Documentation — WisdomAI</title>
<meta name="description" content="Developer documentation: architecture, backend, agent system, learning engine, frontend, and operations.">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="/css/dark-mode.css" rel="stylesheet">
<script id="tailwind-config">try{
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "surface-variant": "#dfe3e6",
          "surface-bright": "#f6fafd",
          "on-secondary-container": "#004966",
          "secondary-fixed": "#c5e7ff",
          "on-tertiary-fixed-variant": "#1f5100",
          "on-surface-variant": "#404750",
          "error-container": "#ffdad6",
          "surface-container-low": "#f0f4f7",
          "outline": "#707881",
          "outline-variant": "#c0c7d1",
          "primary": "#005787",
          "on-primary-container": "#e0eeff",
          "on-background": "#171c1f",
          "on-error": "#ffffff",
          "primary-container": "#0070ad",
          "on-secondary": "#ffffff",
          "on-surface": "#171c1f",
          "tertiary-container": "#327a00",
          "on-tertiary-container": "#bbff92",
          "error": "#ba1a1a",
          "secondary": "#00658c",
          "surface-dim": "#d6dbdd",
          "surface-container-lowest": "#ffffff",
          "surface-container": "#eaeef1",
          "surface-container-high": "#e5e9ec",
          "tertiary": "#255f00",
          "on-tertiary": "#ffffff",
          "on-error-container": "#93000a",
          "surface": "#f6fafd",
          "secondary-container": "#2abcfd",
          "on-primary": "#ffffff",
          "background": "#f6fafd"
        },
        fontFamily: {
          "display": ["Hanken Grotesk"],
          "body": ["Inter"],
          "mono": ["JetBrains Mono"]
        }
      }
    }
  }
}catch(e){}</script>
<style>
  body { font-family: 'Inter', sans-serif; background: #f6fafd; color: #171c1f; }
  .font-display { font-family: 'Hanken Grotesk', sans-serif; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }

  /* ── Rendered markdown (WisdomMarkdown output) ── */
  #doc-view { line-height: 1.65; font-size: 14.5px; }
  #doc-view .md-h1 { font-family: 'Hanken Grotesk', sans-serif; font-size: 1.9rem; font-weight: 800; margin: 0 0 1rem; line-height: 1.2; }
  #doc-view .md-h2 { font-family: 'Hanken Grotesk', sans-serif; font-size: 1.35rem; font-weight: 700; margin: 2rem 0 .6rem; padding-top: .75rem; border-top: 1px solid #c0c7d1; }
  #doc-view .md-h3 { font-family: 'Hanken Grotesk', sans-serif; font-size: 1.08rem; font-weight: 700; margin: 1.4rem 0 .4rem; }
  #doc-view .md-h4 { font-size: .95rem; font-weight: 700; margin: 1.1rem 0 .3rem; }
  #doc-view .md-p { margin: 0 0 .8rem; }
  #doc-view .md-ul, #doc-view .md-ol { margin: 0 0 .9rem; padding-left: 1.4rem; }
  #doc-view .md-ul { list-style: disc; }
  #doc-view .md-ul-nested { margin: .2rem 0; list-style: circle; }
  #doc-view .md-ol { list-style: decimal; }
  #doc-view li { margin: .2rem 0; }
  #doc-view .md-code-inline { font-family: 'JetBrains Mono', monospace; font-size: .85em; background: #eaeef1; border: 1px solid #dfe3e6; border-radius: 5px; padding: .08em .35em; }
  #doc-view .md-pre { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.55; background: #eef2f5; border: 1px solid #dfe3e6; border-radius: 10px; padding: .9rem 1.1rem; margin: 0 0 1rem; overflow-x: auto; }
  #doc-view .md-quote { border-left: 3px solid #005787; background: #eef4f9; border-radius: 0 8px 8px 0; padding: .6rem .9rem; margin: 0 0 .9rem; color: #33414d; }
  #doc-view .md-hr { border: 0; border-top: 1px solid #c0c7d1; margin: 1.4rem 0; }
  #doc-view .md-link { color: #005787; font-weight: 600; text-decoration: underline; text-underline-offset: 2px; }
  #doc-view .md-table-wrap { overflow-x: auto; margin: 0 0 1rem; border: 1px solid #c0c7d1; border-radius: 10px; }
  #doc-view .md-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  #doc-view .md-table th { text-align: left; font-weight: 700; background: #eaeef1; padding: .5rem .75rem; border-bottom: 1px solid #c0c7d1; white-space: nowrap; }
  #doc-view .md-table td { padding: .45rem .75rem; border-bottom: 1px solid #dfe3e6; vertical-align: top; }
  #doc-view .md-table tr:last-child td { border-bottom: 0; }

  .dark #doc-view .md-h2 { border-top-color: #374151; }
  .dark #doc-view .md-code-inline { background: #1f2937; border-color: #374151; }
  .dark #doc-view .md-pre { background: #111827; border-color: #374151; }
  .dark #doc-view .md-quote { background: #17222c; color: #b7c3cd; border-left-color: #2abcfd; }
  .dark #doc-view .md-hr { border-top-color: #374151; }
  .dark #doc-view .md-link { color: #7cc7ff; }
  .dark #doc-view .md-table-wrap { border-color: #374151; }
  .dark #doc-view .md-table th { background: #1f2937; border-bottom-color: #374151; }
  .dark #doc-view .md-table td { border-bottom-color: #263241; }

  #doc-editor-textarea { font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.6; min-height: 60vh; }
  .doc-nav-page.is-active { background: #e0eeff; color: #005787; font-weight: 600; }
  .dark .doc-nav-page.is-active { background: #12324a; color: #7cc7ff; }
  #download-menu { min-width: 220px; }
</style>
</head>
<body class="min-h-screen bg-background text-on-background">
    <script src="/js/auth.js"></script>

<div id="sidebar-mount"></div>

<main class="flex-1 overflow-y-auto sidebar-offset">
  <header class="sticky top-0 z-20 bg-white/80 dark:bg-gray-900/80 backdrop-blur border-b border-outline-variant px-6 py-3 flex items-center justify-between gap-3">
    <div class="flex items-center gap-3 min-w-0">
      <span class="material-symbols-outlined text-primary" style="font-variation-settings:'FILL' 1">description</span>
      <h1 class="font-display font-bold text-xl text-on-surface whitespace-nowrap">Documentation</h1>
      <span class="text-xs text-on-surface-variant hidden lg:inline truncate">Architecture, backend, agents, learning engine, frontend &amp; operations</span>
    </div>
    <div class="flex items-center gap-2 flex-shrink-0">
      <div class="relative">
        <button id="download-btn" type="button"
          class="flex items-center gap-1.5 h-10 border border-outline-variant text-on-surface text-sm font-semibold px-4 rounded-lg hover:bg-surface-container transition-colors">
          <span class="material-symbols-outlined text-base">download</span> Download
          <span class="material-symbols-outlined text-base">expand_more</span>
        </button>
        <div id="download-menu" class="hidden absolute right-0 mt-2 bg-surface-container-lowest dark:bg-gray-800 border border-outline-variant rounded-xl shadow-lg py-2 z-30">
          <div class="px-4 pt-1 pb-1 text-[11px] font-bold uppercase tracking-wide text-on-surface-variant">This page</div>
          <button data-export="page-txt" class="download-option w-full text-left px-4 py-2 text-sm hover:bg-surface-container flex items-center gap-2"><span class="material-symbols-outlined text-base">article</span> Download as TXT</button>
          <button data-export="page-pdf" class="download-option w-full text-left px-4 py-2 text-sm hover:bg-surface-container flex items-center gap-2"><span class="material-symbols-outlined text-base">picture_as_pdf</span> Download as PDF</button>
          <div class="border-t border-outline-variant my-2"></div>
          <div class="px-4 pt-1 pb-1 text-[11px] font-bold uppercase tracking-wide text-on-surface-variant">Entire documentation</div>
          <button data-export="all-txt" class="download-option w-full text-left px-4 py-2 text-sm hover:bg-surface-container flex items-center gap-2"><span class="material-symbols-outlined text-base">article</span> Download as TXT</button>
          <button data-export="all-pdf" class="download-option w-full text-left px-4 py-2 text-sm hover:bg-surface-container flex items-center gap-2"><span class="material-symbols-outlined text-base">picture_as_pdf</span> Download as PDF</button>
        </div>
      </div>
      <button id="edit-btn" type="button"
        class="flex items-center gap-1.5 h-10 bg-primary text-on-primary text-sm font-semibold px-4 rounded-lg hover:opacity-90 transition-opacity">
        <span class="material-symbols-outlined text-base">edit</span> Edit
      </button>
    </div>
  </header>

  <div class="px-6 py-6 max-w-[1280px] mx-auto">
    <div id="docs-error" class="hidden text-sm text-error mb-4 items-center gap-1">
      <span class="material-symbols-outlined text-base align-middle">error</span>
      <span id="docs-error-msg"></span>
    </div>

    <div class="flex gap-8 items-start">
      <!-- Docs tree nav -->
      <nav id="docs-nav" class="hidden md:block w-60 flex-shrink-0 sticky top-20 max-h-[calc(100vh-6rem)] overflow-y-auto pr-1">
        <div class="text-sm text-on-surface-variant py-6 text-center" id="docs-nav-loading">Loading…</div>
      </nav>

      <!-- Content pane -->
      <article class="flex-1 min-w-0">
        <div id="doc-meta" class="hidden mb-4">
          <div class="flex items-center gap-2 text-xs text-on-surface-variant">
            <span id="doc-breadcrumb-section" class="font-semibold uppercase tracking-wide"></span>
            <span>·</span>
            <span>Last updated <span id="doc-updated-at"></span></span>
          </div>
        </div>

        <div id="doc-loading" class="text-sm text-on-surface-variant py-16 text-center">Loading documentation…</div>
        <div id="doc-view" class="hidden text-on-surface"></div>

        <!-- Editor -->
        <div id="doc-editor" class="hidden">
          <div class="flex items-center justify-between mb-3">
            <div class="text-sm text-on-surface-variant flex items-center gap-1.5">
              <span class="material-symbols-outlined text-base">edit_note</span>
              Editing <span id="doc-editor-name" class="font-semibold text-on-surface"></span> — markdown, saved to the repo's <span class="font-mono text-xs">docs/</span> directory
            </div>
            <div class="flex items-center gap-2">
              <button id="editor-cancel-btn" type="button"
                class="h-9 border border-outline-variant text-on-surface text-sm font-semibold px-4 rounded-lg hover:bg-surface-container transition-colors">Cancel</button>
              <button id="editor-save-btn" type="button"
                class="h-9 bg-primary text-on-primary text-sm font-semibold px-4 rounded-lg hover:opacity-90 transition-opacity flex items-center gap-1.5">
                <span class="material-symbols-outlined text-base">save</span> Save
              </button>
            </div>
          </div>
          <textarea id="doc-editor-textarea" spellcheck="false"
            class="w-full rounded-xl border border-outline-variant bg-surface-container-lowest dark:bg-gray-900 text-on-surface p-4 focus:ring-primary focus:border-primary"></textarea>
        </div>
      </article>
    </div>
  </div>
</main>

<script src="/js/sidebar.js"></script>
<script src="/js/markdown.js"></script>
<script>
const wisdomSession = window.WisdomAuth.requireRole('developer');

// Named "notify" (not "showToast") so it never shadows window.showToast —
// WisdomSidebar.toast() checks for that global and delegates to it, so a
// same-named wrapper here would recurse into itself forever.
function notify(msg, type) {
  if (window.WisdomSidebar && window.WisdomSidebar.toast) window.WisdomSidebar.toast(msg, type);
  else alert(msg);
}

let docsTree = null;
let currentSectionId = null;
let currentPageId = null;
let currentContent = '';

function scopeFromUrl() {
  const p = new URLSearchParams(window.location.search).get('page');
  return p && p.indexOf('/') > 0 ? p : null;
}

function firstScope() {
  const s = docsTree.sections[0];
  return s.id + '/' + s.pages[0].id;
}

function renderNav() {
  const nav = document.getElementById('docs-nav');
  let html = '';
  docsTree.sections.forEach(section => {
    html += '<div class="mb-5">' +
      '<div class="flex items-center gap-2 px-2 mb-1.5 text-[11px] font-bold uppercase tracking-wider text-on-surface-variant">' +
        '<span class="material-symbols-outlined text-[16px]">' + section.icon + '</span>' + section.title +
      '</div>';
    section.pages.forEach(page => {
      const scope = section.id + '/' + page.id;
      const active = section.id === currentSectionId && page.id === currentPageId;
      html += '<a href="/documentation?page=' + scope + '" data-scope="' + scope + '" ' +
        'class="doc-nav-page block px-3 py-1.5 rounded-lg text-sm text-on-surface hover:bg-surface-container transition-colors' + (active ? ' is-active' : '') + '">' +
        page.title + '</a>';
    });
    html += '</div>';
  });
  nav.innerHTML = html;
  nav.querySelectorAll('a[data-scope]').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      loadPage(a.getAttribute('data-scope'), true);
    });
  });
}

function setError(msg) {
  const box = document.getElementById('docs-error');
  box.classList.toggle('hidden', !msg);
  if (msg) document.getElementById('docs-error-msg').textContent = msg;
}

async function loadPage(scope, pushHistory) {
  exitEditMode();
  const parts = scope.split('/');
  try {
    const res = await fetch('/api/docs/page/' + parts[0] + '/' + parts[1]);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    currentSectionId = data.section_id;
    currentPageId = data.page_id;
    currentContent = data.content;

    document.getElementById('doc-loading').classList.add('hidden');
    const view = document.getElementById('doc-view');
    view.innerHTML = window.WisdomMarkdown.render(data.content);
    view.classList.remove('hidden');

    document.getElementById('doc-meta').classList.remove('hidden');
    document.getElementById('doc-breadcrumb-section').textContent = data.section_title;
    document.getElementById('doc-updated-at').textContent = data.updated_at
      ? new Date(data.updated_at).toLocaleString() : '—';

    if (pushHistory) history.pushState({}, '', '/documentation?page=' + scope);
    renderNav();
    setError('');
    // Internal doc links navigate in-place instead of full reloads.
    view.querySelectorAll('a.md-link[href^="/documentation?page="]').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        const target = new URLSearchParams(a.getAttribute('href').split('?')[1]).get('page');
        if (target) { loadPage(target, true); window.scrollTo(0, 0); }
      });
    });
    window.scrollTo(0, 0);
  } catch (err) {
    setError('Could not load page "' + scope + '" — ' + err.message);
  }
}

// ── Edit mode ──
function enterEditMode() {
  document.getElementById('doc-view').classList.add('hidden');
  document.getElementById('doc-editor').classList.remove('hidden');
  document.getElementById('doc-editor-name').textContent = currentSectionId + '/' + currentPageId + '.md';
  document.getElementById('doc-editor-textarea').value = currentContent;
  document.getElementById('edit-btn').classList.add('hidden');
}

function exitEditMode() {
  document.getElementById('doc-editor').classList.add('hidden');
  document.getElementById('doc-view').classList.remove('hidden');
  document.getElementById('edit-btn').classList.remove('hidden');
}

document.getElementById('edit-btn').addEventListener('click', enterEditMode);
document.getElementById('editor-cancel-btn').addEventListener('click', exitEditMode);
document.getElementById('editor-save-btn').addEventListener('click', async () => {
  const content = document.getElementById('doc-editor-textarea').value;
  try {
    const res = await fetch('/api/docs/page/' + currentSectionId + '/' + currentPageId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: content, role: wisdomSession ? wisdomSession.role : '' }),
    });
    if (!res.ok) {
      const detail = (await res.json().catch(() => ({}))).detail || ('HTTP ' + res.status);
      throw new Error(detail);
    }
    currentContent = content;
    document.getElementById('doc-view').innerHTML = window.WisdomMarkdown.render(content);
    exitEditMode();
    notify('Documentation saved');
    loadPage(currentSectionId + '/' + currentPageId, false);
  } catch (err) {
    notify('Save failed: ' + err.message, 'warn');
  }
});

// ── Download menu ──
const downloadBtn = document.getElementById('download-btn');
const downloadMenu = document.getElementById('download-menu');
downloadBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  downloadMenu.classList.toggle('hidden');
});
document.addEventListener('click', () => downloadMenu.classList.add('hidden'));
downloadMenu.querySelectorAll('.download-option').forEach(btn => {
  btn.addEventListener('click', () => {
    const kind = btn.getAttribute('data-export'); // page-txt | page-pdf | all-txt | all-pdf
    const format = kind.endsWith('pdf') ? 'pdf' : 'txt';
    const scope = kind.startsWith('all') ? 'all' : (currentSectionId + '/' + currentPageId);
    downloadMenu.classList.add('hidden');
    window.location.href = '/api/docs/export?format=' + format + '&scope=' + encodeURIComponent(scope);
  });
});

// ── Boot ──
window.addEventListener('popstate', () => {
  const scope = scopeFromUrl() || firstScope();
  loadPage(scope, false);
});

(async function init() {
  try {
    const res = await fetch('/api/docs/tree');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    docsTree = await res.json();
    const loading = document.getElementById('docs-nav-loading');
    if (loading) loading.remove();
    renderNav();
    loadPage(scopeFromUrl() || firstScope(), false);
  } catch (err) {
    document.getElementById('doc-loading').classList.add('hidden');
    setError('Could not load the documentation tree — ' + err.message);
  }
})();
</script>
</body>
</html>
